name: Build Repo Listing

on:
  workflow_dispatch:
  release:
    types: [published, created, edited, released]
  workflow_run:
    workflows: [Build Release]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-listing:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      PACKAGE_PATH: Packages/com.heftwig.advandism-avatar-optimizer
      LISTING_URL: https://heftwig.github.io/Advandism-Avatar-Optimizer/index.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build index.json
        shell: bash
        run: |
          mkdir -p Website

          python3 <<'PY'
          import json
          import os
          import urllib.request

          package_path = os.environ["PACKAGE_PATH"]
          listing_url = os.environ["LISTING_URL"]
          repo = os.environ["GITHUB_REPOSITORY"]

          with open(f"{package_path}/package.json", "r", encoding="utf-8") as f:
              manifest = json.load(f)

          package_name = manifest["name"]
          version = manifest["version"]
          zip_name = f"{package_name}-{version}.zip"
          zip_url = f"https://github.com/{repo}/releases/download/{version}/{zip_name}"

          version_manifest = dict(manifest)
          version_manifest["url"] = zip_url

          listing = {
              "name": "Advandism Avatar Optimizer",
              "id": "com.heftwig.advandism-avatar-optimizer-listing",
              "url": listing_url,
              "author": {
                  "name": "Heftwig"
              },
              "description": "VPM listing for Advandism Avatar Optimizer.",
              "packages": {
                  package_name: {
                      "versions": {
                          version: version_manifest
                      }
                  }
              }
          }

          with open("Website/index.json", "w", encoding="utf-8") as f:
              json.dump(listing, f, indent=2)

          with open("Website/index.html", "w", encoding="utf-8") as f:
              f.write("""<!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Advandism Avatar Optimizer VPM</title>
          </head>
          <body>
            <h1>Advandism Avatar Optimizer VPM</h1>
            <p>Use this URL in VCC:</p>
            <code>https://heftwig.github.io/Advandism-Avatar-Optimizer/index.json</code>
          </body>
          </html>
          """)
          PY

          cat Website/index.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4