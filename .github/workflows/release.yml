name: Build Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      packagePath: Packages/com.heftwig.advandism-avatar-optimizer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get package info
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./${{ env.packagePath }}/package.json').version")
          NAME=$(node -p "require('./${{ env.packagePath }}/package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "zipFile=$NAME-$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Create package zip
        shell: bash
        run: |
          cd "${{ env.packagePath }}"
          zip -r "${{ github.workspace }}/${{ steps.pkg.outputs.zipFile }}" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}
          name: ${{ steps.pkg.outputs.name }} ${{ steps.pkg.outputs.version }}
          files: |
            ${{ steps.pkg.outputs.zipFile }}
            ${{ env.packagePath }}/package.json
